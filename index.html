<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>番茄钟 - 时间管理</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <!-- 左侧面板 -->
        <div class="left-panel">
            <!-- 模式切换 -->
            <div class="panel-header">
                <h3>模式切换</h3>
            </div>
            <div class="mode-switch">
                <button id="pomodoroBtn" class="mode-btn active" onclick="switchMode('pomodoro')">
                    专注
                </button>
                <button id="breakBtn" class="mode-btn" onclick="switchMode('break')">
                    短休息
                </button>
                <button id="longBreakBtn" class="mode-btn" onclick="switchMode('longBreak')">
                    长休息
                </button>
            </div>

            <!-- 自定义时间 -->
            <div class="panel-header">
                <h3>自定义时间</h3>
            </div>
            <div class="custom-time">
                <div class="time-input-group">
                    <label>专注时间（分钟）</label>
                    <input type="number" id="pomodoroTime" value="25" min="1" max="60" onchange="updateCustomTime()">
                </div>
                <div class="time-input-group">
                    <label>短休息时间（分钟）</label>
                    <input type="number" id="breakTime" value="5" min="1" max="30" onchange="updateCustomTime()">
                </div>
                <div class="time-input-group">
                    <label>长休息时间（分钟）</label>
                    <input type="number" id="longBreakTime" value="15" min="1" max="60" onchange="updateCustomTime()">
                </div>
            </div>

            <!-- 统计数据 -->
            <div class="panel-header">
                <h3>今日统计</h3>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-icon">🍅</div>
                    <div class="stat-content">
                        <div class="stat-label">今日完成</div>
                        <div class="stat-value" id="todayCompleted">0</div>
                    </div>
                </div>
                <div class="stat-item">
                    <div class="stat-icon">📊</div>
                    <div class="stat-content">
                        <div class="stat-label">总完成数</div>
                        <div class="stat-value" id="totalCompleted">0</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧面板 -->
        <div class="right-panel">
            <div class="timer-card">
                <!-- 计时器显示 -->
                <div class="timer-display">
                    <span id="timer">25:00</span>
                </div>

                <!-- 控制按钮 -->
                <div class="controls">
                    <button id="startBtn" class="control-btn" onclick="toggleTimer()">
                        开始
                    </button>
                    <button class="control-btn" onclick="resetTimer()">
                        重置
                    </button>
                </div>

                <!-- 深色模式切换 -->
                <button id="themeToggle" class="theme-btn" onclick="toggleTheme()">
                    🌙
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
